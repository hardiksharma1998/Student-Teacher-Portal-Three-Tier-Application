name: Backend Build & Push

on:
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Configure AWS credentials
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 🔎 Verify correct AWS account (IMPORTANT)
      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      # 🔐 Manual ECR Login (more reliable than action abstraction)
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region us-east-1 \
          | docker login \
            --username AWS \
            --password-stdin 615299766984.dkr.ecr.us-east-1.amazonaws.com

      # Ensure buildx is properly initialized
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build & Push
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: 615299766984.dkr.ecr.us-east-1.amazonaws.com/dev/backend:${{ github.run_number }}
