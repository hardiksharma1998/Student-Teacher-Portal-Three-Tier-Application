name: Backend Build & Push

on:
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    # Note: If your Dockerfile is INSIDE the backend folder, 
    # keep this. If it's in the root, remove this block.
    defaults:
      run:
        shell: bash
        working-directory: backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Updated to v4 (latest stable)

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          # Use the 'backend' folder as context
          context: ./backend
          # Points to the Dockerfile inside that folder
          file: ./backend/Dockerfile
          push: true
          # Dynamically get the registry URL from the login step
          tags: ${{ steps.login-ecr.outputs.registry }}/dev/backend:${{ github.run_number }}
